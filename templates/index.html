<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Ticket Classifier</title>

<script src="https://unpkg.com/htmx.org@1.9.12"></script>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Inter', sans-serif;
}
</style>

</head>

<body class="bg-[#f8fafc]">

<div class="min-h-screen">

    <!-- HEADER -->

    <header class="border-b border-slate-200 bg-white">
        <div class="max-w-7xl mx-auto px-8 h-16 flex items-center justify-between">

            <div>
                <h1 class="text-lg font-semibold text-slate-900">
                    Ticket Intelligence
                </h1>
            </div>

            <div class="flex items-center gap-3">

                <span class="px-3 py-1 text-xs font-medium rounded-full bg-emerald-50 text-emerald-700">
                    Online
                </span>

            </div>

        </div>
    </header>

    <!-- CONTENT -->

    <main class="max-w-7xl mx-auto p-8">

        <div class="grid lg:grid-cols-5 gap-6">

            <!-- LEFT -->

            <div class="lg:col-span-2">

                <div class="bg-white rounded-2xl border border-slate-200">

                    <div class="p-6 border-b border-slate-200">

                        <h2 class="font-semibold text-slate-900">
                            Customer Ticket
                        </h2>

                        <p class="text-sm text-slate-500 mt-1">
                            Paste or write the support request below.
                        </p>

                    </div>

                    <div class="p-6">

                        <form
                            hx-post="/classify"
                            hx-target="#response-box"
                            hx-indicator="#loader"
                            class="space-y-5"
                        >

                            <textarea
                                name="ticket"
                                rows="12"
                                placeholder="Example: I was charged twice for my order and cannot reach support..."
                                class="w-full resize-none rounded-xl border border-slate-300 px-4 py-4 text-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none"
                            ></textarea>

                            <button
                                type="submit"
                                class="w-full bg-slate-900 text-white py-3 rounded-xl font-medium hover:bg-slate-800 transition"
                            >
                                Analyze Ticket
                            </button>

                            <div id="loader" class="htmx-indicator">

                                <div class="flex items-center gap-3 text-sm text-slate-500">

                                    <svg class="animate-spin h-4 w-4"
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24">

                                        <circle
                                            class="opacity-25"
                                            cx="12"
                                            cy="12"
                                            r="10"
                                            stroke="currentColor"
                                            stroke-width="4">
                                        </circle>

                                        <path
                                            class="opacity-75"
                                            fill="currentColor"
                                            d="M4 12a8 8 0 018-8v8z">
                                        </path>

                                    </svg>

                                    Processing ticket...
                                </div>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="lg:col-span-3">

                <div
                    id="response-box"
                    class="bg-white rounded-2xl border border-slate-200 min-h-[650px]"
                >

                    <div class="h-full flex items-center justify-center">

                        <div class="text-center">

                            <div class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center mx-auto mb-4">

                                <svg width="28" height="28"
                                     fill="none"
                                     stroke="currentColor"
                                     viewBox="0 0 24 24">

                                    <path stroke-width="2"
                                          d="M9 12h6M9 16h6M8 4h8a2 2 0 012 2v12a2 2 0 01-2 2H8a2 2 0 01-2-2V6a2 2 0 012-2z"/>

                                </svg>

                            </div>

                            <h3 class="font-semibold text-slate-900">
                                Awaiting Analysis
                            </h3>

                            <p class="text-slate-500 text-sm mt-2">
                                Ticket classification results will appear here.
                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

</body>

</html>
